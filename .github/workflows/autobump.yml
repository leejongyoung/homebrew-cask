name: Autobump

on:
  schedule:
    - cron: "0 9 * * *" # 매일 UTC 09:00 (KST 18:00)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  detect:
    name: Detect casks
    runs-on: ubuntu-latest
    outputs:
      casks: ${{ steps.scan.outputs.casks }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan Casks directory
        id: scan
        run: |
          json=$(find Casks -name "*.rb" | sed 's|Casks/[^/]*/||;s|\.rb$||' | sort \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "casks=$json" >> "$GITHUB_OUTPUT"

  detect-formulas:
    name: Detect formulas
    runs-on: ubuntu-latest
    outputs:
      formulas: ${{ steps.scan.outputs.formulas }}
      has_formulas: ${{ steps.scan.outputs.has_formulas }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan Formula directory
        id: scan
        run: |
          if [ -d Formula ]; then
            json=$(find Formula -name "*.rb" | sed 's|Formula/[^/]*/||;s|\.rb$||' | sort \
              | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "has_formulas=true" >> "$GITHUB_OUTPUT"
          else
            json="[]"
            echo "has_formulas=false" >> "$GITHUB_OUTPUT"
          fi
          echo "formulas=$json" >> "$GITHUB_OUTPUT"

  autobump:
    name: Autobump ${{ matrix.cask }}
    needs: detect
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        cask: ${{ fromJSON(needs.detect.outputs.casks) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Sync Casks to registered tap
        run: |
          tap_dir="$(brew --repository leejongyoung/cask)"
          rsync -a "$GITHUB_WORKSPACE/Casks/" "$tap_dir/Casks/"

      - name: Check for new version
        id: livecheck
        run: |
          result=$(brew livecheck --cask --json "leejongyoung/cask/${{ matrix.cask }}")
          current=$(echo "$result" | jq -r '.[0].version.current')
          latest=$(echo "$result" | jq -r '.[0].version.latest')
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "latest=$latest"   >> "$GITHUB_OUTPUT"
          if [ "$current" != "$latest" ]; then
            echo "outdated=true" >> "$GITHUB_OUTPUT"
          else
            echo "outdated=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute SHA256 for new version
        id: sha256
        if: steps.livecheck.outputs.outdated == 'true'
        run: |
          latest="${{ steps.livecheck.outputs.latest }}"
          cask_file="Casks/${CASK:0:1}/$CASK.rb"

          # url 스탠자에서 #{version}을 최신 버전으로 치환해 실제 URL 생성
          url=$(grep '^\s*url ' "$cask_file" \
            | sed 's/.*url "\(.*\)"/\1/' \
            | sed "s/#{version}/$latest/g")

          echo "Downloading: $url"
          sha=$(curl -fsSL "$url" | shasum -a 256 | awk '{print $1}')
          echo "sha256=$sha" >> "$GITHUB_OUTPUT"
        env:
          CASK: ${{ matrix.cask }}

      - name: Update cask file
        if: steps.livecheck.outputs.outdated == 'true'
        run: |
          cask_file="Casks/${CASK:0:1}/$CASK.rb"
          current="${{ steps.livecheck.outputs.current }}"
          latest="${{ steps.livecheck.outputs.latest }}"
          sha256="${{ steps.sha256.outputs.sha256 }}"

          sed -i '' \
            -e "s|version \"$current\"|version \"$latest\"|" \
            -e "s|sha256 \".*\"|sha256 \"$sha256\"|" \
            "$cask_file"

          echo "=== Updated $cask_file ==="
          cat "$cask_file"
        env:
          CASK: ${{ matrix.cask }}

      - name: Verify style after update
        if: steps.livecheck.outputs.outdated == 'true'
        run: brew style "Casks/${CASK:0:1}/$CASK.rb"
        env:
          CASK: ${{ matrix.cask }}

      - name: Commit and push
        if: steps.livecheck.outputs.outdated == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "Casks/${CASK:0:1}/$CASK.rb"
          git commit -m "chore: bump $CASK to ${{ steps.livecheck.outputs.latest }}"
          git push
        env:
          CASK: ${{ matrix.cask }}

  autobump-formula:
    name: Autobump Formula ${{ matrix.formula }}
    needs: detect-formulas
    if: needs.detect-formulas.outputs.has_formulas == 'true'
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        formula: ${{ fromJSON(needs.detect-formulas.outputs.formulas) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Sync Formula to registered tap
        run: |
          tap_dir="$(brew --repository leejongyoung/cask)"
          mkdir -p "$tap_dir/Formula"
          rsync -a "$GITHUB_WORKSPACE/Formula/" "$tap_dir/Formula/"

      - name: Check for new version
        id: livecheck
        run: |
          result=$(brew livecheck --formula --json "leejongyoung/cask/${{ matrix.formula }}")
          current=$(echo "$result" | jq -r '.[0].version.current')
          latest=$(echo "$result" | jq -r '.[0].version.latest')
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "latest=$latest"   >> "$GITHUB_OUTPUT"
          if [ "$current" != "$latest" ]; then
            echo "outdated=true" >> "$GITHUB_OUTPUT"
          else
            echo "outdated=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute SHA256 for new version
        id: sha256
        if: steps.livecheck.outputs.outdated == 'true'
        run: |
          current="${{ steps.livecheck.outputs.current }}"
          latest="${{ steps.livecheck.outputs.latest }}"
          formula_file="Formula/${FORMULA:0:1}/$FORMULA.rb"

          # url에서 현재 버전을 최신 버전으로 치환해 실제 URL 생성
          url=$(grep '^\s*url ' "$formula_file" \
            | sed 's/.*url "\(.*\)"/\1/' \
            | sed "s/$current/$latest/g")

          echo "Downloading: $url"
          sha=$(curl -fsSL "$url" | shasum -a 256 | awk '{print $1}')
          echo "sha256=$sha" >> "$GITHUB_OUTPUT"
        env:
          FORMULA: ${{ matrix.formula }}

      - name: Update formula file
        if: steps.livecheck.outputs.outdated == 'true'
        run: |
          formula_file="Formula/${FORMULA:0:1}/$FORMULA.rb"
          current="${{ steps.livecheck.outputs.current }}"
          latest="${{ steps.livecheck.outputs.latest }}"
          sha256="${{ steps.sha256.outputs.sha256 }}"

          sed -i '' \
            -e "s|$current|$latest|g" \
            -e "s|sha256 \".*\"|sha256 \"$sha256\"|" \
            "$formula_file"

          echo "=== Updated $formula_file ==="
          cat "$formula_file"
        env:
          FORMULA: ${{ matrix.formula }}

      - name: Verify style after update
        if: steps.livecheck.outputs.outdated == 'true'
        run: brew style "Formula/${FORMULA:0:1}/$FORMULA.rb"
        env:
          FORMULA: ${{ matrix.formula }}

      - name: Commit and push
        if: steps.livecheck.outputs.outdated == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "Formula/${FORMULA:0:1}/$FORMULA.rb"
          git commit -m "chore: bump $FORMULA to ${{ steps.livecheck.outputs.latest }}"
          git push
        env:
          FORMULA: ${{ matrix.formula }}
