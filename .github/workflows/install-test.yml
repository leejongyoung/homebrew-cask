name: Install Test

on:
  workflow_dispatch:
    inputs:
      cask:
        description: "Cask token to test (e.g. gemini-alexcding)"
        required: true
        type: string
      skip_uninstall:
        description: "Skip uninstall step after install"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  install:
    name: Install ${{ inputs.cask }}
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Sync Casks to registered tap
        run: |
          tap_dir="$(brew --repository leejongyoung/cask)"
          rsync -a "$GITHUB_WORKSPACE/Casks/" "$tap_dir/Casks/"

      - name: Fetch cask artifact
        run: brew fetch --cask "leejongyoung/cask/${{ inputs.cask }}"
        timeout-minutes: 30

      - name: Take pre-install system snapshot
        run: |
          find /Applications -maxdepth 1 -name "*.app" | sort > /tmp/snapshot_before.txt
          echo "=== Applications before install ==="
          cat /tmp/snapshot_before.txt

      - name: Install cask
        run: brew install --cask "leejongyoung/cask/${{ inputs.cask }}"
        timeout-minutes: 30

      - name: Take post-install system snapshot
        run: |
          find /Applications -maxdepth 1 -name "*.app" | sort > /tmp/snapshot_after.txt
          echo "=== Installed by cask ==="
          diff /tmp/snapshot_before.txt /tmp/snapshot_after.txt || true

      - name: Uninstall cask (zap)
        if: ${{ !inputs.skip_uninstall }}
        run: brew uninstall --zap --cask "leejongyoung/cask/${{ inputs.cask }}"
